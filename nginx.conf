server {
    listen       80;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page-app fallback: unknown routes go to index.html.
    location / {
        try_files $uri /index.html;
    }

    # Proxy /api/* to the FastAPI backend container. SSE needs disabled
    # buffering and a long read timeout so the stream doesn't cut off
    # mid-run on longer budgets.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 30m;
        proxy_send_timeout 30m;
    }
}
